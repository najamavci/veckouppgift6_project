<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Old Letter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #cfcfcf;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .letter {
      position: relative;
      width: 600px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      padding: 0;
    }

    .address {
      font-family: 'Cormorant Garamond', serif;
      padding: 3em 2em 1em 4em;
      font-size: 1.5rem;
    }

    .address p {
      margin: 0.5em 0;
      border-bottom: 1px solid #444;
      width: fit-content;
      min-width: 240px;
    }

    .stamp {
      position: absolute;
      top: 2rem;
      left: 28rem;
      width: 70px;
      height: 90px;
      border: 2px dashed #a33;
      background: #f4d4d4;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      transform: rotate(-8deg);
    }
  </style>
</head>
<body>
  <div class="letter">
    <div class="stamp">STAMP</div>
    <div class="address">
      <p>Jane Doe</p>
      <p>Book Street 12</p>
      <p>123 45 Reading Town</p>
    </div>
  </div>
</body>
</html>
